<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23章 注意すべき分詞</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-pink: #fff0f6;
            --primary-pink: #ff80ab;
            --dark-pink: #c94b7b;
            --text-black: #2c3e50;
            --white: #ffffff;
            --correct-green: #4caf50;
            --wrong-red: #ff5252;
            --correct-blue: #1e88e5;
        }

        /* --- ブラウザ版（通常時）スタイル --- */
        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: var(--bg-pink);
            color: var(--text-black);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .no-print { width: 100%; max-width: 850px; display: flex; flex-direction: column; align-items: center; }

        .control-panel { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            padding: 12px 20px; border-radius: 25px; border: 2px solid var(--primary-pink);
            background: white; color: var(--dark-pink); cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary-pink); color: white; }

        .container {
            background: var(--white); width: 100%;
            padding: 40px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
            box-sizing: border-box;
        }

        .translation { font-size: 1.1rem; color: #555; margin-bottom: 15px; font-weight: bold; }
        .sentence { font-size: 1.4rem; margin-bottom: 30px; line-height: 1.6; min-height: 3em; }
        .sentence b { color: var(--dark-pink); border-bottom: 2px solid var(--dark-pink); }
        .blank { border-bottom: 2px solid var(--dark-pink); min-width: 80px; display: inline-block; color: var(--dark-pink); padding: 0 10px; font-weight: bold; }

        .solved-sentence { font-size: 1.6rem; color: var(--text-black); font-weight: bold; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .solved-sentence mark { background: none; color: var(--dark-pink); text-decoration: underline; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .choice-btn {
            background: white; border: 2px solid #ffc1e3; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .choice-btn:hover { background: #fff1f8; }
        .choice-btn.wrong { background: #ffebee; border-color: var(--wrong-red); color: var(--wrong-red); }

        .sortable-area { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; min-height: 60px; border: 2px dashed var(--primary-pink); padding: 20px; border-radius: 15px; background: #fff9fb; }
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .word-chip { background: white; border: 2px solid var(--primary-pink); color: var(--dark-pink); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .word-chip.used { opacity: 0; pointer-events: none; }

        .explanation-box { 
            display: none; font-size: 1rem; color: var(--correct-blue); 
            background: #e3f2fd; padding: 20px; border-radius: 12px;
            margin-top: 25px; text-align: left; line-height: 1.6; border-left: 5px solid var(--correct-blue);
        }

        .action-btn {
            background: var(--dark-pink); color: white; border: none;
            padding: 15px 50px; border-radius: 35px; font-size: 1.2rem;
            cursor: pointer; margin-top: 25px; display: none;
        }

        /* --- Command + P (印刷) 用スタイル --- */
        @media print {
            body { 
                background: white; 
                color: black; 
                padding: 0; 
                font-family: 'Kosugi Maru', sans-serif; 
            }
            .no-print, .control-panel, #next-btn, .explanation-box, #interactive-area, #progress { 
                display: none !important; 
            }
            .container { box-shadow: none; padding: 0; width: 100%; }
            #print-worksheet { display: block !important; }
            h1 { font-size: 16pt; border-bottom: 2px solid black; padding-bottom: 5px; }
            h2 { font-size: 13pt; margin-top: 22px; border-left: 4px solid black; padding-left: 10px; text-align: left; }
            
            /* Part1 は行間を狭めに */
            .p1-item { text-align: left; margin-bottom: 8px; page-break-inside: avoid; line-height: 1.4; }
            
            /* Part2 & 3 は広めの行間を維持 */
            .print-item { text-align: left; margin-bottom: 18px; page-break-inside: avoid; line-height: 1.6; }
            
            .print-q { font-size: 10pt; margin-bottom: 4px; font-weight: bold; }
            .print-en { font-size: 11pt; margin-left: 5px; }
            .print-blank { border-bottom: 1px solid black; min-width: 100px; display: inline-block; height: 1.0em; vertical-align: bottom; }
            .print-hint { font-size: 9pt; font-style: italic; color: #333; margin-left: 5px; }
            .name-field { text-align: right; margin-bottom: 15px; font-size: 10pt; }
        }

        #print-worksheet { display: none; }
    </style>
</head>
<body>

<div class="no-print">
    <header><h1 style="color: var(--dark-pink);">23章 注意すべき分詞</h1></header>

    <div class="control-panel">
        <button class="tab-btn active" onclick="switchPart(1)">Part 1: 意味の識別</button>
        <button class="tab-btn" onclick="switchPart(2)">Part 2: 穴埋め問題</button>
        <button class="tab-btn" onclick="switchPart(3)">Part 3: 並べ替え</button>
    </div>

    <div class="container">
        <div id="progress" style="margin-bottom: 15px; font-weight: bold; color: var(--dark-pink);">Question 1</div>
        <div id="q-trans" class="translation"></div>
        <div id="q-sentence" class="sentence"></div>
        <div id="interactive-area"></div>
        <div id="explanation" class="explanation-box"></div>
        <button id="next-btn" class="action-btn" onclick="handleNext()">Next →</button>
    </div>
</div>

<div id="print-worksheet">
    <h1>23章 注意すべき分詞</h1>
    <div class="name-field">氏名：__________________________</div>

    <h2>Part 1: 意味の識別</h2>
    <p style="font-size:9pt; margin-bottom:8px;">分詞構文の意味を [ 理由 / 時 / 条件 / 譲歩 / 付帯状況 / 結果 ] から選んで書きなさい。</p>
    <div id="p1-print"></div>

    <h2>Part 2: 穴埋め問題</h2>
    <p style="font-size:9pt; margin-bottom:10px;">日本文の意味に合うように、適切な語を選択肢から選びなさい。</p>
    <div id="p2-print"></div>

    <h2>Part 3: 並べ替え問題</h2>
    <p style="font-size:9pt; margin-bottom:10px;">日本文の意味に合うように、( )内の語句を正しく並べ替えなさい。</p>
    <div id="p3-print"></div>
</div>

<script>
const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

const quizData = {
    p1: [
        { en: "<b>Born and raised</b> in Kyoto, he is very familiar with the local history.", ans: "理由", exp: "「京都で生まれ育ったので」という理由（原因）を表します。" },
        { en: "<b>Seen</b> from a distance, the rock looks like a giant turtle.", ans: "条件", exp: "「もし遠くから見れば」という条件の意味を含んでいます。" },
        { en: "The train leaves at noon, <b>arriving</b> in London at 3 p.m.", ans: "結果", exp: "「正午に出発して、（その結果）3時に到着する」という時間の流れを表します。" },
        { en: "<b>Admitting</b> what you say, I still cannot agree with your plan.", ans: "譲歩", exp: "「あなたの言うことは認めるけれども（譲歩）」同意はできないという逆接的関係です。" },
        { en: "She sat on the bench, <b>watching</b> the sunset.", ans: "付帯状況", exp: "「ベンチに座っている」のと同時に「夕日を見ている」という同時動作です。" },
        { en: "<b>Feeling</b> a bit tired, I decided to take a short nap.", ans: "理由", exp: "「少し疲れていたので」という理由を表します。" }
    ],
    p2: [
        { jp: "日本は天然資源が乏しいので、原材料を輸入に頼らなければならない。", en: "(  ) poor in natural resources, Japan must rely on imported raw materials.", ans: "Being", options: ["Is", "Being", "Been", "Having"], exp: "主語(Japan)の状態を説明する独立分詞構文です。" },
        { jp: "彼は口を布で覆われたまま、何かを言おうとしていた。", en: "He tried to say something with his mouth (  ) with a cloth.", ans: "covered", options: ["covering", "covered", "covers", "to cover"], exp: "口は「覆われる」受動の関係なので過去分詞を用います。" },
        { jp: "以前その映画を見ていたので、私は結末を知っていた。", en: "(  ) the movie before, I knew the ending.", ans: "Having seen", options: ["Seeing", "Seen", "Having seen", "To see"], exp: "「知っていた」時よりも「見た」のが前なので完了形分詞構文にします。" },
        { jp: "彼女は髪を風になびかせながら、海岸を走っていた。", en: "She was running on the beach with her hair (  ) in the wind.", ans: "streaming", options: ["streamed", "streaming", "streams", "to stream"], exp: "髪が自ら「たなびいている」能動的な状態なので現在分詞です。" },
        { jp: "不意をつかれて、彼は何と答えていいか分からなかった。", en: "(  ) by surprise, he didn't know how to answer.", ans: "Taken", options: ["Taking", "Taken", "Took", "Having taken"], exp: "take by surprise（驚かせる）の受動態。過去分詞から始めます。" },
        { jp: "厳密に言えば、あなたの理論は間違っている。", en: "(  ) speaking, your theory is incorrect.", ans: "Strictly", options: ["Strictly", "Generally", "Frankly", "Roughly"], exp: "Strictly speaking は「厳密に言えば」という慣用句です。" },
        { jp: "太陽が昇ったので、私たちは山登りを始めた。", en: "The sun (  ), we started climbing the mountain.", ans: "having risen", options: ["rising", "risen", "having risen", "has risen"], exp: "太陽が昇った（完了）＋主語が異なる（独立分詞構文）の形です。" },
        { jp: "叱られるのが怖くて、彼女は真実を話せなかった。", en: "(  ) of being scolded, she couldn't tell the truth.", ans: "Afraid", options: ["Fearing", "Afraid", "Fear", "To fear"], exp: "Being afraid of... の Being が省略された分詞構文です。" },
        { jp: "一般的に言って、女性の方が男性より長生きする傾向がある。", en: "(  ) speaking, women tend to live longer than men.", ans: "Generally", options: ["Strictly", "Generally", "Frankly", "Roughly"], exp: "Generally speaking は「一般的に言って」という慣用句です。" },
        { jp: "ほかの条件が同じならば、私はこちらの案を採用したい。", en: "Other things (  ) equal, I would like to adopt this plan.", ans: "being", options: ["is", "been", "being", "to be"], exp: "Other things being equal は「他の条件が同じなら」という慣用句です。" },
        { jp: "その知らせに驚いて、彼女は持っていたグラスを落とした。", en: "(  ) at the news, she dropped the glass she was holding.", ans: "Shocked", options: ["Shocking", "Shocked", "To shock", "Having shocked"], exp: "彼女が「ショックを受けた」ので、受動を表す過去分詞を使います。" },
        { jp: "率直に言って、君の歌はプロレベルだよ。", en: "(  ) speaking, your singing is at a professional level.", ans: "Frankly", options: ["Frankly", "Strictly", "Judging", "Roughly"], exp: "Frankly speaking は「率直に言って」という慣用句です。" }
    ],
    p3: [
        {
            jp: "責任感の欠如を厳しく非難されて、アンドレアは自分の実績を彼らのものと比較することで反論した。",
            en: "________________, Andrea countered them by comparing her performance with theirs.",
            ans: "Severely accused of having a lack of responsibility",
            words: ["Severely", "accused", "of", "having", "a", "lack", "of", "responsibility"],
            displayAns: "<mark>Severely accused of having a lack of responsibility</mark>, Andrea countered them by comparing her performance with theirs.",
            exp: "副詞(Severely)が受動態の分詞構文を修飾しています。"
        },
        {
            jp: "一晩中、窓を開けたままにしていたので、彼はひどい風邪を引いてしまった。",
            en: "________________, he caught a bad cold.",
            ans: "Having kept the window open all night",
            words: ["Having", "kept", "the", "window", "open", "all", "night"],
            displayAns: "<mark>Having kept the window open all night</mark>, he caught a bad cold.",
            exp: "完了形(Having kept)とSVOC(kept O open)の組み合わせです。"
        },
        {
            jp: "彼女が以前住んでいた場所から判断すると、彼女はフランス語が堪能に違いない。",
            en: "________________, she must be fluent in French.",
            ans: "Judging from where she used to live",
            words: ["Judging", "from", "where", "she", "used", "to", "live"],
            displayAns: "<mark>Judging from where she used to live</mark>, she must be fluent in French.",
            exp: "慣用句 Judging from の後に場所の節が続いた高度な形です。"
        },
        {
            jp: "太陽が沈んでしまったので、あたりは急速に暗くなり始めた。",
            en: "________________, it began to get dark quickly.",
            ans: "The sun having set",
            words: ["The", "sun", "having", "set"],
            displayAns: "<mark>The sun having set</mark>, it began to get dark quickly.",
            exp: "主語の異なる独立分詞構文かつ、時制のズレを示す完了形です。"
        },
        {
            jp: "彼は足を組んで椅子に座り、難しい本を読んでいた。",
            en: "He was sitting in the chair ________________.",
            ans: "with his legs crossed reading a difficult book",
            words: ["with", "his", "legs", "crossed", "reading", "a", "difficult", "book"],
            displayAns: "He was sitting in the chair <mark>with his legs crossed reading a difficult book</mark>.",
            exp: "with O C と、別の動作(reading...)をコンマなしで自然につなげた形です。"
        }
    ]
};

let currentPartNum = 1;
let currentIdx = 0;

function switchPart(num) {
    currentPartNum = num;
    currentIdx = 0;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === num - 1));
    loadQuestion();
}

function loadQuestion() {
    const partKey = 'p' + currentPartNum;
    const data = quizData[partKey][currentIdx];
    const area = document.getElementById('interactive-area');
    
    document.getElementById('progress').textContent = `Part ${currentPartNum} - Question ${currentIdx + 1} / ${quizData[partKey].length}`;
    document.getElementById('q-trans').textContent = data.jp || "分詞構文の意味を選びなさい。";
    document.getElementById('q-sentence').innerHTML = data.en.replace("(  )", "<span class='blank'>?</span>");
    document.getElementById('explanation').style.display = "none";
    document.getElementById('next-btn').style.display = "none";
    
    area.innerHTML = "";
    if (data.options || currentPartNum === 1) {
        const grid = document.createElement('div');
        grid.className = "choices-grid";
        const opts = shuffle(data.options || ["理由", "時", "条件", "譲歩", "付帯状況", "結果"]);
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.textContent = opt;
            btn.onclick = () => checkChoice(opt, btn);
            grid.appendChild(btn);
        });
        area.appendChild(grid);
    } else {
        const sortArea = document.createElement('div');
        sortArea.className = "sortable-area";
        sortArea.id = "answer-zone";
        area.appendChild(sortArea);
        const bank = document.createElement('div');
        bank.className = "word-bank";
        shuffle(data.words).forEach((word) => {
            const chip = document.createElement('span');
            chip.className = "word-chip";
            chip.textContent = word;
            chip.onclick = () => {
                chip.classList.add('used');
                const clone = document.createElement('span');
                clone.className = "word-chip";
                clone.textContent = word;
                clone.onclick = () => { chip.classList.remove('used'); clone.remove(); };
                sortArea.appendChild(clone);
                checkSortAnswer();
            };
            bank.appendChild(chip);
        });
        area.appendChild(bank);
    }
}

function checkChoice(selected, btn) {
    const data = quizData['p' + currentPartNum][currentIdx];
    if (selected === data.ans) {
        confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
        const blank = document.querySelector('.blank');
        if(blank) { 
            blank.textContent = selected; 
            blank.style.borderBottom = "none"; 
        }
        showResult();
    } else { btn.classList.add('wrong'); }
}

function checkSortAnswer() {
    const data = quizData['p' + currentPartNum][currentIdx];
    const userAns = Array.from(document.getElementById('answer-zone').children).map(c => c.textContent).join(" ");
    if (userAns === data.ans) {
        confetti({ particleCount: 100, spread: 100, origin: { y: 0.6 } });
        document.getElementById('q-sentence').innerHTML = `<div class="solved-sentence">${data.displayAns}</div>`;
        document.getElementById('interactive-area').innerHTML = ""; 
        showResult();
    }
}

function showResult() {
    const data = quizData['p' + currentPartNum][currentIdx];
    const exp = document.getElementById('explanation');
    exp.innerHTML = `<strong>正解！</strong><br>${data.exp}`;
    exp.style.display = "block";
    document.getElementById('next-btn').style.display = "inline-block";
}

function handleNext() {
    currentIdx++;
    const partKey = 'p' + currentPartNum;
    if (currentIdx < quizData[partKey].length) loadQuestion();
    else alert("Part Complete!");
}

function setupPrint() {
    // P1
    let p1Html = "";
    quizData.p1.forEach((q, i) => {
        p1Html += `<div class="p1-item"><div class="print-q">${i+1}. ${q.en}</div><div class="print-en">(　　　　)</div></div>`;
    });
    document.getElementById('p1-print').innerHTML = p1Html;

    // P2
    let p2Html = "";
    quizData.p2.forEach((q, i) => {
        const hint = `[ ${shuffle(q.options).join(" / ")} ]`;
        p2Html += `<div class="print-item"><div class="print-q">${i+1}. ${q.jp}</div><div class="print-en">${q.en.replace("(  )", "<span class='print-blank'></span>")}</div><div class="print-hint">${hint}</div></div>`;
    });
    document.getElementById('p2-print').innerHTML = p2Html;

    // P3
    let p3Html = "";
    quizData.p3.forEach((q, i) => {
        const hint = `( ${shuffle(q.words).join(" / ")} )`;
        p3Html += `<div class="print-item"><div class="print-q">${i+1}. ${q.jp}</div><div class="print-hint">${hint}</div><div style="margin-top:10px; border-bottom:1px solid #000; height:1.4em;"></div></div>`;
    });
    document.getElementById('p3-print').innerHTML = p3Html;
}

window.onload = () => { loadQuestion(); setupPrint(); };
</script>
</body>
</html>
