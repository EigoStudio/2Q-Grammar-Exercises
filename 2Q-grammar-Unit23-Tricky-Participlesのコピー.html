<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23章 注意すべき分詞</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-pink: #fff0f6;
            --primary-pink: #ff80ab;
            --dark-pink: #c94b7b;
            --text-black: #2c3e50;
            --white: #ffffff;
            --correct-green: #4caf50;
            --wrong-red: #ff5252;
            --correct-blue: #1e88e5;
        }

        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: var(--bg-pink);
            color: var(--text-black);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .no-print { width: 100%; max-width: 850px; display: flex; flex-direction: column; align-items: center; }

        .control-panel { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            padding: 12px 20px; border-radius: 25px; border: 2px solid var(--primary-pink);
            background: white; color: var(--dark-pink); cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary-pink); color: white; }

        .container {
            background: var(--white); width: 100%;
            padding: 40px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
            box-sizing: border-box;
        }

        .translation { font-size: 1.1rem; color: #555; margin-bottom: 15px; font-weight: bold; }
        .sentence { font-size: 1.4rem; margin-bottom: 30px; line-height: 1.6; min-height: 3em; }
        .sentence b { color: var(--dark-pink); border-bottom: 2px solid var(--dark-pink); }
        .blank { border-bottom: 2px solid var(--dark-pink); min-width: 80px; display: inline-block; color: var(--dark-pink); padding: 0 10px; font-weight: bold; }

        .solved-sentence { font-size: 1.6rem; color: var(--text-black); font-weight: bold; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .solved-sentence mark { background: none; color: var(--dark-pink); text-decoration: underline; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .choice-btn {
            background: white; border: 2px solid #ffc1e3; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .choice-btn:hover { background: #fff1f8; }
        .choice-btn.wrong { background: #ffebee; border-color: var(--wrong-red); color: var(--wrong-red); }

        .sortable-area { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; min-height: 60px; border: 2px dashed var(--primary-pink); padding: 20px; border-radius: 15px; background: #fff9fb; }
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .word-chip { background: white; border: 2px solid var(--primary-pink); color: var(--dark-pink); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .word-chip.used { opacity: 0; pointer-events: none; }

        .explanation-box { 
            display: none; font-size: 1rem; color: var(--correct-blue); 
            background: #e3f2fd; padding: 20px; border-radius: 12px;
            margin-top: 25px; text-align: left; line-height: 1.6; border-left: 5px solid var(--correct-blue);
        }

        .action-btn {
            background: var(--dark-pink); color: white; border: none;
            padding: 15px 50px; border-radius: 35px; font-size: 1.2rem;
            cursor: pointer; margin-top: 25px; display: none;
        }
    </style>
</head>
<body>

<div class="no-print">
    <header><h1 style="color: var(--dark-pink);">23章 注意すべき分詞</h1></header>

    <div class="control-panel">
        <button class="tab-btn active" onclick="switchPart(1)">Part 1: 意味の識別</button>
        <button class="tab-btn" onclick="switchPart(2)">Part 2: 穴埋め問題</button>
        <button class="tab-btn" onclick="switchPart(3)">Part 3: 並べ替え</button>
    </div>

    <div class="container">
        <div id="progress" style="margin-bottom: 15px; font-weight: bold; color: var(--dark-pink);">Question 1</div>
        <div id="q-trans" class="translation"></div>
        <div id="q-sentence" class="sentence"></div>
        <div id="interactive-area"></div>
        <div id="explanation" class="explanation-box"></div>
        <button id="next-btn" class="action-btn" onclick="handleNext()">Next →</button>
    </div>
</div>

<script>
const quizData = {
    p1: [
        { en: "<b>Born and raised</b> in Kyoto, he is very familiar with the local history.", trans: "Born and raised... の意味を選びなさい。", ans: "理由", options: ["理由", "時", "条件", "譲歩"], exp: "「京都で生まれ育ったので」という因果関係（理由）を表します。" },
        { en: "<b>Seen</b> from a distance, the rock looks like a giant turtle.", trans: "Seen... の意味を選びなさい。", ans: "条件", options: ["理由", "時", "条件", "譲歩"], exp: "「もし遠くから見れば」という仮定の条件を含んでいます。" },
        { en: "The train leaves at noon, <b>arriving</b> in London at 3 p.m.", trans: "arriving... の意味を選びなさい。", ans: "結果", options: ["付帯状況", "時", "理由", "結果"], exp: "「出発して、その結果〜に到着する」という時間の流れ（結果）を表します。" },
        { en: "<b>Admitting</b> what you say, I still cannot agree with your plan.", trans: "Admitting... の意味を選びなさい。", ans: "譲歩", options: ["譲歩", "理由", "付帯状況", "条件"], exp: "「君の言うことは認めるけれども（譲歩）」、同意はできないという逆接的な関係です。" },
        { en: "She sat on the bench, <b>watching</b> the sunset.", trans: "watching... の意味を選びなさい。", ans: "付帯状況", options: ["理由", "付帯状況", "条件", "結果"], exp: "「座っている」のと同時に「見ている」という同時進行の動作（付帯状況）です。" },
        { en: "<b>Feeling</b> a bit tired, I decided to take a short nap.", trans: "Feeling... の意味を選びなさい。", ans: "理由", options: ["理由", "時", "譲歩", "結果"], exp: "「疲れていたので」という理由を表します。" }
    ],
    p2: [
        { jp: "日本は天然資源が乏しいので、原材料を輸入に頼らなければならない。", en: "(  ) poor in natural resources, Japan must rely on imported raw materials.", ans: "Being", options: ["Is", "Being", "Been", "Having"], exp: "主語(Japan)が乏しい状態であることを示す分詞構文です。文頭なので現在分詞の Being を使います。" },
        { jp: "彼は口を布で覆われたまま、何かを言おうとしていた。", en: "He tried to say something with his mouth (  ) with a cloth.", ans: "covered", options: ["covering", "covered", "covers", "to cover"], exp: "付帯状況の with + O + C。口は「覆われる」という受動の関係なので過去分詞を用います。" },
        { jp: "以前その映画を見ていたので、私は結末を知っていた。", en: "(  ) the movie before, I knew the ending.", ans: "Having seen", options: ["Seeing", "Seen", "Having seen", "To see"], exp: "「知っていた（過去）」時点より前に「見た」ことを表すため、完了形分詞構文(Having + 過去分詞)にします。" },
        { jp: "彼女は髪を風になびかせながら、海岸を走っていた。", en: "She was running on the beach with her hair (  ) in the wind.", ans: "streaming", options: ["streamed", "streaming", "streams", "to stream"], exp: "髪が自ら「たなびいている」能動的な状態なので現在分詞を使います。" },
        { jp: "不意をつかれて、彼は何と答えていいか分からなかった。", en: "(  ) by surprise, he didn't know how to answer.", ans: "Taken", options: ["Taking", "Taken", "Took", "Having taken"], exp: "take 〜 by surprise（驚かせる）の受動態。彼が「驚かされた」ので過去分詞を用います。" },
        { jp: "厳密に言えば、あなたの理論は間違っている。", en: "(  ) speaking, your theory is incorrect.", ans: "Strictly", options: ["Strictly", "Generally", "Frankly", "Roughly"], exp: "Strictly speaking（厳密に言えば）は頻出の慣用表現です。" },
        { jp: "太陽が昇ったので、私たちは山登りを始めた。", en: "The sun (  ), we started climbing the mountain.", ans: "having risen", options: ["rising", "risen", "having risen", "has risen"], exp: "独立分詞構文かつ完了形です。「昇った」のが「始めた」より前であることを示します。" },
        { jp: "叱られるのが怖くて、彼女は真実を話せなかった。", en: "(  ) of being scolded, she couldn't tell the truth.", ans: "Afraid", options: ["Fearing", "Afraid", "Fear", "To fear"], exp: "Being afraid of... の Being が省略された形です。" },
        { jp: "一般的に言って、女性の方が男性より長生きする傾向がある。", en: "(  ) speaking, women tend to live longer than men.", ans: "Generally", options: ["Strictly", "Generally", "Frankly", "Roughly"], exp: "Generally speaking（一般的に言って）です。" },
        { jp: "ほかの条件が同じならば、私はこちらの案を採用したい。", en: "Other things (  ) equal, I would like to adopt this plan.", ans: "being", options: ["is", "been", "being", "to be"], exp: "Other things being equal（他の条件が同じなら）という慣用句です。" },
        { jp: "その知らせに驚いて、彼女は持っていたグラスを落とした。", en: "(  ) at the news, she dropped the glass she was holding.", ans: "Shocked", options: ["Shocking", "Shocked", "To shock", "Having shocked"], exp: "彼女が「ショックを受けた（驚かされた）」ので過去分詞を用います。" },
        { jp: "率直に言って、君の歌はプロレベルだよ。", en: "(  ) speaking, your singing is at a professional level.", ans: "Frankly", options: ["Frankly", "Strictly", "Judging", "Roughly"], exp: "Frankly speaking（率直に言って）です。" }
    ],
    p3: [
        {
            jp: "責任感の欠如を厳しく非難されて、アンドレアは自分の実績を彼らのものと比較することで反論した。",
            en: "________________, Andrea countered them by comparing her performance with theirs.",
            ans: "Severely accused of having a lack of responsibility",
            words: ["Severely", "accused", "of", "having", "a", "lack", "of", "responsibility"],
            displayAns: "<mark>Severely accused of having a lack of responsibility</mark>, Andrea countered them by comparing her performance with theirs.",
            exp: "受動態の分詞構文(accused of)を、副詞(Severely)が前から修飾しています。"
        },
        {
            jp: "一晩中、窓を開けたままにしていたので、彼はひどい風邪を引いてしまった。",
            en: "________________, he caught a bad cold.",
            ans: "Having kept the window opened all night",
            words: ["Having", "kept", "the", "window", "opened", "all", "night"],
            displayAns: "<mark>Having kept the window opened all night</mark>, he caught a bad cold.",
            exp: "完了形(Having kept)とSVOC構造(kept the window opened)が組み合わさった形です。"
        },
        {
            jp: "彼女が以前住んでいた場所から判断すると、彼女はフランス語が堪能に違いない。",
            en: "________________, she must be fluent in French.",
            ans: "Judging from where she used to live",
            words: ["Judging", "from", "where", "she", "used", "to", "live"],
            displayAns: "<mark>Judging from where she used to live</mark>, she must be fluent in French.",
            exp: "慣用表現 Judging from に、場所を表す節（where S V）が続いています。"
        },
        {
            jp: "太陽が沈んでしまったので、あたりは急速に暗くなり始めた。",
            en: "________________, it began to get dark quickly.",
            ans: "The sun having set",
            words: ["The", "sun", "having", "set"],
            displayAns: "<mark>The sun having set</mark>, it began to get dark quickly.",
            exp: "主節と主語が異なる「独立分詞構文」かつ、時制が前の「完了形」の形です。"
        },
        {
            jp: "彼は足を組んで椅子に座り、難しい本を読んでいた。",
            en: "He was sitting in the chair ________________.",
            ans: "with his legs crossed reading a difficult book",
            words: ["with", "his", "legs", "crossed", "reading", "a", "difficult", "book"],
            displayAns: "He was sitting in the chair <mark>with his legs crossed reading a difficult book</mark>.",
            exp: "「with O C（足を組んだ状態で）」という付帯状況のすぐ後に、さらに「reading...（〜を読みながら）」という分詞が続いています。このように複数の動作が密接に重なる場合、コンマなしでつなげるのが一般的です。"
        }
    ]
};

let currentPartNum = 1;
let currentIdx = 0;

function switchPart(num) {
    currentPartNum = num;
    currentIdx = 0;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === num - 1);
    });
    loadQuestion();
}

function loadQuestion() {
    const partKey = 'p' + currentPartNum;
    const data = quizData[partKey][currentIdx];
    const area = document.getElementById('interactive-area');
    
    document.getElementById('progress').textContent = `Part ${currentPartNum} - Question ${currentIdx + 1} / ${quizData[partKey].length}`;
    document.getElementById('q-trans').textContent = data.jp || data.trans;
    document.getElementById('q-sentence').innerHTML = data.en.replace("(  )", "<span class='blank'>?</span>");
    document.getElementById('explanation').style.display = "none";
    document.getElementById('next-btn').style.display = "none";
    
    area.innerHTML = "";

    if (data.options) {
        const grid = document.createElement('div');
        grid.className = "choices-grid";
        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.textContent = opt;
            btn.onclick = () => checkChoice(opt, btn);
            grid.appendChild(btn);
        });
        area.appendChild(grid);
    } else {
        const sortArea = document.createElement('div');
        sortArea.className = "sortable-area";
        sortArea.id = "answer-zone";
        area.appendChild(sortArea);

        const bank = document.createElement('div');
        bank.className = "word-bank";
        const shuffled = [...data.words].sort(() => Math.random() - 0.5);
        shuffled.forEach((word) => {
            const chip = document.createElement('span');
            chip.className = "word-chip";
            chip.textContent = word;
            chip.onclick = () => {
                chip.classList.add('used');
                const clone = document.createElement('span');
                clone.className = "word-chip";
                clone.textContent = word;
                clone.onclick = () => { chip.classList.remove('used'); clone.remove(); };
                sortArea.appendChild(clone);
                checkSortAnswer();
            };
            bank.appendChild(chip);
        });
        area.appendChild(bank);
    }
}

function checkChoice(selected, btn) {
    const data = quizData['p' + currentPartNum][currentIdx];
    if (selected === data.ans) {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        const blank = document.querySelector('.blank');
        if(blank) {
            blank.textContent = selected;
            blank.style.borderBottom = "none";
        }
        showResult();
    } else {
        btn.classList.add('wrong');
    }
}

function checkSortAnswer() {
    const data = quizData['p' + currentPartNum][currentIdx];
    const userAns = Array.from(document.getElementById('answer-zone').children).map(c => c.textContent).join(" ");
    if (userAns === data.ans) {
        confetti({ particleCount: 120, spread: 100, origin: { y: 0.6 }, scalar: 1.2 });
        const sentenceArea = document.getElementById('q-sentence');
        sentenceArea.innerHTML = `<div class="solved-sentence">${data.displayAns}</div>`;
        document.getElementById('interactive-area').innerHTML = ""; 
        showResult();
    }
}

function showResult() {
    const data = quizData['p' + currentPartNum][currentIdx];
    const exp = document.getElementById('explanation');
    exp.innerHTML = `<strong>正解！</strong><br>${data.exp}`;
    exp.style.display = "block";
    document.getElementById('next-btn').style.display = "inline-block";
}

function handleNext() {
    currentIdx++;
    const partKey = 'p' + currentPartNum;
    if (currentIdx < quizData[partKey].length) loadQuestion();
    else alert("Part Complete!");
}

window.onload = () => loadQuestion();
</script>
</body>
</html>
